{% extends "admin/base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h3><i class="fas fa-cogs"></i> Turnierkonfiguration</h3>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('update_config', game_name=game_name) }}" method="POST">

                        <div class="alert alert-info">
                            <i class="fas fa-info-circle"></i> Änderungen hier führen zu einer Neuberechnung aller Spielzeiten!
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-4 col-form-label">Spieldauer (Minuten)</label>
                            <div class="col-sm-8">
                                <input type="number" class="form-control" name="match_duration" 
                                       min="1" max="20" value="{{ config.match_duration }}" required>
                                <small class="form-text text-muted">Wert zwischen 1-20 Minuten</small>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-4 col-form-label">Pause zwischen Spielen (Min)</label>
                            <div class="col-sm-8">
                                <input type="number" class="form-control" name="break_between_games" 
                                       min="1" max="20" value="{{ config.break_between_games }}" required>
                                <small class="form-text text-muted">Wert zwischen 1-20 Minuten</small>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-4 col-form-label">Pause zwischen Runden (Min)</label>
                            <div class="col-sm-8">
                                <input type="number" class="form-control" name="break_between_rounds" 
                                       min="1" max="20" value="{{ config.break_between_rounds }}" required>
                                <small class="form-text text-muted">Wert zwischen 1-20 Minuten</small>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label class="col-sm-4 col-form-label">Turnier Startzeit</label>
                            <div class="col-sm-8">
                                <input type="time" class="form-control" name="start_time" 
                                       value="{{ config.start_time }}">
                            </div>
                        </div>

                        <hr>

                        <div class="text-right">
                            <a href="{{ url_for('game_overview', game_name=game_name) }}" 
                               class="btn btn-secondary">Abbrechen</a>
                            <button type="submit" class="btn btn-primary">Speichern & Zeiten neu berechnen</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
