<div class="card mb-3 shadow-sm">
    <div class="card-header py-1 small bg-light d-flex justify-content-between align-items-center">
        <span class="font-weight-bold">#{{ match.match_number }}</span>
        <span class="text-muted">
            {{ match.time or '—' }}
            {% if match.court %} · Feld {{ match.court }}{% endif %}
        </span>
    </div>
    <div class="card-body p-2">
        <form action="{{ url_for('save_follower_cup_result', game_name=game_name, match_id=match.id) }}" method="POST">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <span class="text-truncate {% if match.winner == match.team1 %}font-weight-bold text-success{% endif %}"
                    style="max-width:120px" title="{{ match.team1 }}">{{ match.team1 or 'TBD' }}</span>
                <input type="number" name="score1" class="form-control form-control-sm score-input px-1"
                    style="width:45px" value="{{ match.score1 if match.score1 is not none else '' }}">
            </div>
            <div class="d-flex justify-content-between align-items-center">
                <span class="text-truncate {% if match.winner == match.team2 %}font-weight-bold text-success{% endif %}"
                    style="max-width:120px" title="{{ match.team2 }}">{{ match.team2 or 'TBD' }}</span>
                <input type="number" name="score2" class="form-control form-control-sm score-input px-1"
                    style="width:45px" value="{{ match.score2 if match.score2 is not none else '' }}">
            </div>
            {% if match.team1 and match.team2 %}
            <div class="text-right mt-2">
                <button type="submit" class="btn btn-sm btn-outline-success py-0">
                    <i class="fas fa-save"></i>
                </button>
            </div>
            {% endif %}
            {% if match.winner %}
            <div class="mt-1 text-center">
                <span class="badge badge-success small">✓ {{ match.winner }}</span>
            </div>
            {% endif %}
        </form>
    </div>
</div>
