{% extends "admin/base.html" %}
{% block title %}DE Ergebnisse — {{ game_name }}{% endblock %}

{% block content %}
<div class="page-header">
  <div class="container-fluid px-4">
    <h1><i class="bi bi-diagram-3 me-2"></i>Double Elimination — Ergebnisse</h1>
    <div class="subtitle">{{ game_name }}</div>
  </div>
</div>

<div class="container-fluid px-4 fade-in">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div id="save-status" class="text-muted" style="font-size:.82rem;"></div>
    <button type="button" id="save-all-btn" class="btn btn-sm btn-primary">
      <i class="bi bi-save me-1"></i>Alle speichern
    </button>
  </div>

  <ul class="nav nav-pills mb-3" id="deTabs">
    <li class="nav-item">
      <button class="nav-link active" data-tab="pills-wb">
        <i class="bi bi-trophy me-1" style="color:#16A34A;"></i>Winner Bracket
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-tab="pills-lb">
        <i class="bi bi-shield-x me-1" style="color:#dc2626;"></i>Loser Bracket
      </button>
    </li>
  </ul>

  <div id="pills-wb"></div>
  <div id="pills-lb" style="display:none;"></div>

</div>

<style>
.match-card { background:var(--card-bg); border:1px solid var(--border); border-radius:8px; margin-bottom:8px; overflow:hidden; }
.match-card.pending { opacity:.55; }
.match-card.done { border-left:3px solid #16A34A; }
.match-card .mc-head { background:#1e3a5f; color:#94A3B8; font-size:.68rem; padding:3px 10px; display:flex; gap:12px; }
.mc-head .mn { color:#fff; font-weight:700; }
.mc-head .mt { color:#F59E0B; }
.mc-head .mf { color:#60A5FA; }
.match-body { display:flex; align-items:center; gap:8px; padding:8px 10px; }
.team-name { width:160px; font-size:.85rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; }
.team-name.winner-team { color:#16A34A; }
.team-name.right { text-align:right; }
.score-inp { width:52px; text-align:center; padding:4px; border-radius:6px; border:1px solid var(--border); background:var(--input-bg,#0F172A); color:var(--text,#F1F5F9); font-weight:700; font-size:.9rem; }
.score-inp:focus { outline:none; border-color:#3b82f6; }
.round-header { font-size:.85rem; font-weight:700; letter-spacing:1px; padding:4px 12px; border-radius:6px; color:#fff; margin:16px 0 6px; display:inline-block; }
.rh-wb { background:#1a6b3a; }
.rh-lb { background:#7a3000; }
.winner-badge { font-size:.65rem; background:#F0FDF4; color:#15803D; border:1px solid #BBF7D0; border-radius:4px; padding:2px 6px; white-space:nowrap; }
</style>

<script>
const GAME    = "{{ game_name }}";
const API_URL = '/api/de_matches/' + GAME;
const SAVE_URL= '/update_double_elim_result/' + GAME + '/';

const WB_LABELS = {1:'1/16-Finale', 2:'1/8-Finale', 3:'Viertelfinale', 4:'WB Finale'};
const LB_LABELS = {1:'LB R1', 2:'LB R2', 3:'LB R3', 4:'LB R4', 5:'LB R5', 6:'LB R6', 7:'LB R7', 8:'LB Finale'};

let matchCache = {};

document.querySelectorAll('#deTabs .nav-link').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#deTabs .nav-link').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('pills-wb').style.display = tab === 'pills-wb' ? '' : 'none';
    document.getElementById('pills-lb').style.display = tab === 'pills-lb' ? '' : 'none';
  });
});

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildCard(m) {
  const played = m.winner != null;
  const hasTeams = m.team1 && m.team2;
  const cls = 'match-card' + (played ? ' done' : (!hasTeams ? ' pending' : ''));
  const t1win = played && m.winner === m.team1;
  const t2win = played && m.winner === m.team2;
  const badge = played ? `<span class="winner-badge"><i class="bi bi-check2 me-1"></i>${esc(m.winner)}</span>` : '';

  if (!hasTeams) {
    return `<div class="${cls}" id="card-${m.id}">
      <div class="mc-head"><span class="mn">#${m.match_number||'?'}</span><span class="mt">${m.time||'–'}</span><span class="mf">${m.court?'Feld '+m.court:''}</span></div>
      <div class="match-body" style="color:#94A3B8;font-size:.8rem;"><i class="bi bi-hourglass me-2"></i>Wartet auf Ergebnisse…</div>
    </div>`;
  }

  return `<div class="${cls}" id="card-${m.id}">
    <div class="mc-head">
      <span class="mn">#${m.match_number||'?'}</span>
      <span class="mt">${m.time||'–'}</span>
      <span class="mf">${m.court?'Feld '+m.court:''}</span>
      <span class="ms-auto">${badge}</span>
    </div>
    <div class="match-body">
      <div class="team-name right ${t1win?'winner-team':''}">${esc(m.team1)}</div>
      <input type="number" class="score-inp score1" data-id="${m.id}" value="${m.score1!=null?m.score1:''}" min="0" max="42" placeholder="–">
      <span style="color:#94A3B8;font-size:.8rem;">:</span>
      <input type="number" class="score-inp score2" data-id="${m.id}" value="${m.score2!=null?m.score2:''}" min="0" max="42" placeholder="–">
      <div class="team-name ${t2win?'winner-team':''}">${esc(m.team2)}</div>
      <button class="btn btn-sm btn-success save-btn ms-auto" data-id="${m.id}" style="padding:3px 10px;"><i class="bi bi-check-lg"></i></button>
    </div>
  </div>`;
}

function renderAll(matches) {
  matches.forEach(m => matchCache[m.id] = m);
  const wb = {}, lb = {};
  matches.forEach(m => {
    if (m.bracket === 'Winners') { (wb[m.round] = wb[m.round]||[]).push(m); }
    else { (lb[m.round] = lb[m.round]||[]).push(m); }
  });
  buildSection('pills-wb', wb, WB_LABELS, 'rh-wb');
  buildSection('pills-lb', lb, LB_LABELS, 'rh-lb');
  attachHandlers();
}

function buildSection(containerId, rounds, labels, hdrCls) {
  const c = document.getElementById(containerId);
  let html = '';
  Object.keys(rounds).map(Number).sort((a,b)=>a-b).forEach(r => {
    html += `<div class="round-header ${hdrCls}">${labels[r]||'Runde '+r}</div>`;
    rounds[r].forEach(m => html += buildCard(m));
  });
  c.innerHTML = html || '<div class="text-muted p-3">Keine Matches.</div>';
}

function saveMatch(id, btn) {
  const card = document.getElementById('card-' + id);
  const s1 = card.querySelector('.score1').value.trim();
  const s2 = card.querySelector('.score2').value.trim();
  if (!s1 || !s2 || parseInt(s1) === parseInt(s2)) {
    btn.classList.add('btn-warning'); btn.classList.remove('btn-success');
    setTimeout(() => { btn.classList.remove('btn-warning'); btn.classList.add('btn-success'); }, 1500);
    return;
  }
  btn.disabled = true; btn.innerHTML = '<i class="bi bi-arrow-repeat"></i>';
  const fd = new FormData();
  fd.append('score1', s1); fd.append('score2', s2);
  fetch(SAVE_URL + id, { method:'POST', headers:{'X-Requested-With':'XMLHttpRequest'}, body:fd })
  .then(r => r.json())
  .then(data => {
    btn.disabled = false; btn.innerHTML = '<i class="bi bi-check-lg"></i>';
    if (data.ok && data.matches) {
      data.matches.forEach(m => { matchCache[m.id] = m; });
      renderAll(Object.values(matchCache));
    } else if (data.error) {
      document.getElementById('save-status').textContent = '❌ ' + data.error;
    }
  })
  .catch(() => {
    btn.disabled = false; btn.classList.add('btn-danger'); btn.classList.remove('btn-success');
    btn.innerHTML = '<i class="bi bi-x"></i>';
    setTimeout(() => { btn.classList.remove('btn-danger'); btn.classList.add('btn-success'); btn.innerHTML = '<i class="bi bi-check-lg"></i>'; }, 2000);
  });
}

function attachHandlers() {
  document.querySelectorAll('.save-btn').forEach(btn => {
    const nb = btn.cloneNode(true); btn.replaceWith(nb);
    nb.addEventListener('click', () => saveMatch(nb.dataset.id, nb));
  });
}

document.getElementById('save-all-btn').addEventListener('click', function() {
  const toSave = [];
  document.querySelectorAll('.score1').forEach(inp => {
    const id = inp.dataset.id;
    const card = document.getElementById('card-' + id);
    if (!card) return;
    const s1 = inp.value.trim(), s2 = card.querySelector('.score2').value.trim();
    if (s1 && s2 && parseInt(s1) !== parseInt(s2)) toSave.push({id, s1, s2});
  });
  if (!toSave.length) return;
  const status = document.getElementById('save-status');
  let done = 0;
  function next(i) {
    if (i >= toSave.length) { status.textContent = done + ' gespeichert ✓'; renderAll(Object.values(matchCache)); return; }
    const {id, s1, s2} = toSave[i];
    status.textContent = (i+1) + '/' + toSave.length + ' speichern…';
    const fd = new FormData(); fd.append('score1', s1); fd.append('score2', s2);
    fetch(SAVE_URL + id, { method:'POST', headers:{'X-Requested-With':'XMLHttpRequest'}, body:fd })
    .then(r => r.json())
    .then(data => { if (data.ok && data.matches) data.matches.forEach(m => { matchCache[m.id] = m; }); done++; next(i+1); })
    .catch(() => next(i+1));
  }
  next(0);
});

fetch(API_URL)
  .then(r => r.json())
  .then(data => {
    if (!Array.isArray(data) || data.length === 0) {
      document.getElementById('pills-wb').innerHTML = '<div class="text-muted p-3"><i class="bi bi-info-circle me-2"></i>Noch keine Double Elimination generiert.</div>';
      document.getElementById('pills-lb').innerHTML = '<div class="text-muted p-3"><i class="bi bi-info-circle me-2"></i>Noch keine Double Elimination generiert.</div>';
      return;
    }
    renderAll(data);
  })
  .catch(err => {
    document.getElementById('pills-wb').innerHTML = '<div class="text-danger p-3">Fehler beim Laden: ' + err + '</div>';
  });
</script>
{% endblock %}
