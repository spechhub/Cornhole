{% extends "display/base.html" %}

{% block content %}

<!-- View A: Gruppen 1-5 -->
<div id="view-a">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h2 class="display-title">Round Robin &mdash; <span style="color:#F59E0B;">Gruppen 1–5</span></h2>
    <div class="cd-wrap">
      Wechselt in <span id="cd-a">30</span>s
      <div class="cd-bar"><div id="bar-a" class="cd-fill" style="background:#F59E0B;"></div></div>
    </div>
  </div>
  <div id="container-a" class="grp-row">
    <div class="loading">Lade Daten...</div>
  </div>
</div>

<!-- View B: Gruppen 6-10 -->
<div id="view-b" style="display:none;">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h2 class="display-title">Round Robin &mdash; <span style="color:#60A5FA;">Gruppen 6–10</span></h2>
    <div class="cd-wrap">
      Wechselt in <span id="cd-b">30</span>s
      <div class="cd-bar"><div id="bar-b" class="cd-fill" style="background:#60A5FA;"></div></div>
    </div>
  </div>
  <div id="container-b" class="grp-row">
    <div class="loading">Lade Daten...</div>
  </div>
</div>

<style>
  body { background:#0F172A; color:#F1F5F9; font-family:'DM Sans',sans-serif; }

  .display-title {
    font-family:'Bebas Neue',cursive;
    font-size:1.8rem; letter-spacing:2px; color:#F1F5F9;
  }

  .cd-wrap { font-size:.8rem; color:rgba(255,255,255,.5); text-align:right; }
  .cd-bar  { width:120px; height:5px; background:rgba(255,255,255,.15); border-radius:99px; margin-top:4px; }
  .cd-fill { height:100%; border-radius:99px; transition:width 1s linear; }

  .grp-row  { display:flex; gap:6px; width:100%; }
  .grp-card { flex:1; background:#1E293B; border-radius:8px; border:1px solid #334155; overflow:hidden; min-width:0; }
  .grp-head { background:#1e3a5f; color:#F59E0B; font-family:'Bebas Neue',cursive;
              font-size:.95rem; letter-spacing:1px; text-align:center; padding:4px 2px; }
  .grp-tbl  { width:100%; border-collapse:collapse; font-size:.7rem; }
  .grp-tbl td { padding:2px 3px; border-bottom:1px solid #0F172A; }
  .grp-tbl tr:last-child td { border-bottom:none; }

  /* Phasen-Zeilenhintergrund */
  .ph-de  { background:rgba(22,163,74,.22); }
  .ph-wc  { background:rgba(217,119,6,.28); }
  .ph-fc  { background:rgba(124,58,237,.22); }
  .ph-plz { background:rgba(100,116,139,.08); }

  /* Phase-Badge */
  .pb     { font-size:.56rem; font-weight:700; border-radius:3px; padding:1px 4px; white-space:nowrap; }
  .pb-de  { background:#16A34A; color:#fff; }
  .pb-wc  { background:#D97706; color:#fff; }
  .pb-fc  { background:#7C3AED; color:#fff; }
  .pb-plz { background:#334155; color:#94A3B8; }

  /* Rang-Kreis — Farbe nach Phase, NICHT Gold/Silber/Bronze */
  .rk     { width:16px; height:16px; border-radius:50%; display:inline-flex;
            align-items:center; justify-content:center; font-size:.62rem; font-weight:700; flex-shrink:0; }
  .rk-de  { background:#16A34A; color:#fff; }   /* Grün  = DE */
  .rk-wc  { background:#D97706; color:#fff; }   /* Orange = Wildcard */
  .rk-fc  { background:#7C3AED; color:#fff; }   /* Violett = Follower Cup */
  .rk-plz { background:#334155; color:#64748B; } /* Grau = Platzierung */

  /* Legende */
  .legend   { display:flex; gap:12px; flex-wrap:wrap; font-size:.7rem;
              color:rgba(255,255,255,.6); margin-bottom:6px; align-items:center; }
  .leg      { display:flex; align-items:center; gap:4px; }
  .leg-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

  .loading  { color:rgba(255,255,255,.3); padding:2rem; width:100%; text-align:center; }
</style>

<script>
const GAME = "{{ game_name }}";
let pollTimer = null;
let cdTimer   = null;
let currentView = 'a';

// ── Phasen-Helfer ─────────────────────────────────────────────────────────────
function rowCls(phase) {
  if (phase==='DE*') return 'ph-wc';
  if (phase==='DE')  return 'ph-de';
  if (phase==='FC')  return 'ph-fc';
  return 'ph-plz';
}

// Rang-Kreis: Farbe = Phase (nicht Rang!)
function rkCls(phase) {
  if (phase==='DE*') return 'rk rk-wc';
  if (phase==='DE')  return 'rk rk-de';
  if (phase==='FC')  return 'rk rk-fc';
  return 'rk rk-plz';
}

function badgeCls(phase) {
  if (phase==='DE*') return 'pb pb-wc';
  if (phase==='DE')  return 'pb pb-de';
  if (phase==='FC')  return 'pb pb-fc';
  return 'pb pb-plz';
}

function badgeLbl(phase) {
  if (phase==='DE*') return 'WC⭐';
  if (phase==='DE')  return 'DE';
  if (phase==='FC')  return 'FC';
  return 'PLZ';
}

// ── Gruppe HTML ───────────────────────────────────────────────────────────────
function buildGroup(g, rows) {
  let body = '';
  rows.forEach((r, i) => {
    const phase = r.phase || 'PLZ';
    const bold  = (phase==='DE' || phase==='DE*') ? '600' : '400';
    body += `<tr class="${rowCls(phase)}">
      <td style="width:20px;padding-left:3px;">
        <span class="${rkCls(phase)}">${i+1}</span>
      </td>
      <td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
                 max-width:72px;color:#F1F5F9;font-weight:${bold};">
        ${r.team}
      </td>
      <td style="text-align:right;color:#94A3B8;font-size:.65rem;">
        ${r.goals_for ?? r.points ?? '–'}
      </td>
      <td style="text-align:right;padding-right:3px;">
        <span class="${badgeCls(phase)}">${badgeLbl(phase)}</span>
      </td>
    </tr>`;
  });
  return `<div class="grp-card">
    <div class="grp-head">GRP ${g}</div>
    <table class="grp-tbl"><tbody>${body}</tbody></table>
  </div>`;
}

// ── Legende ───────────────────────────────────────────────────────────────────
const LEGEND = `<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#16A34A;"></div>Double Elimination</div>
  <div class="leg"><div class="leg-dot" style="background:#D97706;"></div>Wildcard ⭐</div>
  <div class="leg"><div class="leg-dot" style="background:#7C3AED;"></div>Follower Cup</div>
  <div class="leg"><div class="leg-dot" style="background:#334155;border:1px solid #475569;"></div>Platzierungsrunde</div>
</div>`;

// ── API laden ─────────────────────────────────────────────────────────────────
let cachedData = null;

function loadData(cb) {
  fetch('/api/display/' + GAME + '/groups_json')
    .then(r => r.json())
    .then(data => { cachedData = data; cb(data); })
    .catch(() => { if (cachedData) cb(cachedData); });
}

function renderGroups(data, groupNums, containerId) {
  const c = document.getElementById(containerId);
  let html = LEGEND + '<div style="display:flex;gap:6px;width:100%;flex:1;">';
  groupNums.forEach(g => { html += buildGroup(g, data[g] || []); });
  html += '</div>';
  c.innerHTML = html;
}

// ── Countdown ─────────────────────────────────────────────────────────────────
function startCd(secs, spanId, barId, onDone) {
  let left = secs;
  document.getElementById(spanId).textContent = left;
  document.getElementById(barId).style.width = '100%';
  clearInterval(cdTimer);
  cdTimer = setInterval(() => {
    left--;
    document.getElementById(spanId).textContent = left;
    document.getElementById(barId).style.width = (left/secs*100) + '%';
    if (left <= 0) { clearInterval(cdTimer); onDone(); }
  }, 1000);
}

// ── Views ─────────────────────────────────────────────────────────────────────
function showA() {
  currentView = 'a';
  document.getElementById('view-a').style.display = '';
  document.getElementById('view-b').style.display = 'none';
  clearInterval(pollTimer);
  loadData(d => renderGroups(d, [1,2,3,4,5], 'container-a'));
  pollTimer = setInterval(() => loadData(d => renderGroups(d, [1,2,3,4,5], 'container-a')), 5000);
  startCd(30, 'cd-a', 'bar-a', showB);
}

function showB() {
  currentView = 'b';
  document.getElementById('view-a').style.display = 'none';
  document.getElementById('view-b').style.display = '';
  clearInterval(pollTimer);
  loadData(d => renderGroups(d, [6,7,8,9,10], 'container-b'));
  pollTimer = setInterval(() => loadData(d => renderGroups(d, [6,7,8,9,10], 'container-b')), 5000);
  startCd(30, 'cd-b', 'bar-b', showA);
}

showA();
</script>
{% endblock %}
